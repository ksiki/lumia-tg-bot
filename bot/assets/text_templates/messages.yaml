  <i>Если время неизвестно, напиши «не знаю» — в этом случае расчет будет произведен на 12:00 с возможной погрешностью.</i>

partner_city_question: | 
  <b>Место рождения 🌍</b>
  Введите <b>город рождения</b> партнера:

loyalty_context_question: | 
  <b>Тени и сомнения 🌑</b>
  Опиши свои подозрения или конкретные ситуации, которые тебя тревожат. Я учту это при глубоком анализе.

compatibility_wait: | 
