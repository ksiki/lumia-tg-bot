start_message: |
  <b>Привет, {username}! ✨</b>
  
  Твой проводник в мир звезд и арканов. Давай настроим твой профиль для точных прогнозов. 🔮

whats_your_name_question: |
  <b>Как мне к тебе обращаться? 🌙</b>
  Напиши свое имя.

your_girl_or_man_question: |
  <b>Укажи свой пол ✨</b>
  Это нужно для настройки твоих энергетических потоков.

when_your_birthday_question: |
  <b>Дата рождения 📅</b>
  Напиши в формате: <code>ДД.ММ.ГГГГ</code> (например, <code>22.05.2003</code>).

not_valid_when_your_birthday_question: |
  <b>Ошибка в формате 🌌</b>
  Пожалуйста, пришли дату строго так: <code>ДД.ММ.ГГГГ</code>.

time_your_birth_question: |
  <b>Время рождения ⭐</b>
  Напиши в формате <code>ЧЧ:ММ</code>. Если не знаешь — укажи <code>00:00</code>.

not_valid_time_your_birth_question: |
  <b>Неверный формат ⏳</b>
  Используй формат <i>ЧЧ:ММ</i> (например, <code>15:30</code>).

your_city_birth_question: |
  <b>Город рождения 🌍</b>
  Это необходимо для построения натальной карты.

your_city_residence_question: |
  <b>Где ты сейчас? 📍</b>
  Напиши город проживания, чтобы получать прогнозы вовремя.

not_valid_your_city_question: |
  <b>Город не найден 🗺️</b>
  Попробуй написать название еще раз.

