### Сообщения для раздела Таро ================================================================
taro_one_card_wait: | 
  <b>Тасую колоду... 🃏</b>
  Вытягиваю для тебя одну карту, которая покажет главную энергию настоящего момента... 🔮

taro_three_cards_wait: | 
  <b>Раскладываю карты... 🃏</b>
  Делаю расклад на 3 карты. Сейчас мы заглянем в прошлое, настоящее и увидим перспективу дня... ✨

deep_taro_query: | 
  <b>Глубокое погружение 🌊</b>
  Опиши суть проблемы или ситуации, которую ты хочешь разобрать. Чем точнее запрос, тем яснее будет ответ карт.

deep_taro_context: | 
  <b>Дополнительные штрихи 🖌️</b>
  Добавь дополнительные детали или контекст ситуации (по желанию). Если хочешь пропустить этот шаг, просто нажми «Пропустить».

deep_taro_wait: | 
  <b>Настраиваюсь на твое поле... 🧘‍♀️</b>
  Делаю глубокий расклад из 7 карт. Это займет несколько мгновений... 🔮

