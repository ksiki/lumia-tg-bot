# Стартовый диалог ======================================================================

start_message: |
  <b>Привет, сияющая {username}! ✨</b>

  Добро пожаловать в твой личный проводник по звездам и арканам. Здесь мы расшифровываем сигналы Вселенной, заглядываем в будущее и находим ответы, которые уже есть внутри тебя.

  Давай познакомимся поближе, чтобы прогнозы были максимально точными! 🔮

whats_your_name_question: |
  <b>Прекрасное начало! 🌙</b>

  Как мне к тебе обращаться? Напиши своё имя (так, как тебе больше всего нравится).

your_girl_or_man_question: |
  <b>Приятно познакомиться! ✨</b>

  Чтобы я могла лучше настроить твои энергетические потоки, укажи, пожалуйста, свой пол:

when_your_birthday_question: |
  <b>Твоя дата рождения — это уникальный код твоей судьбы 📅</b>

  Напиши её в формате <code>ДД.ММ.ГГГГ</code> (например, <code>22.05.2003</code>). Это поможет мне рассчитать твой личный гороскоп и Матрицу Судьбы.

not_valid_when_your_birthday_question: |
  <b>Звезды немного запутались в числах... 🌌</b>
  Кажется, формат даты указан неверно. Пожалуйста, напиши свою дату рождения строго в формате <code>ДД.ММ.ГГГГ</code> (например, <code>22.05.2003</code>)

time_your_birth_question: |
  <b>Звезды любят точность! ⭐</b>

  В какое время ты родилась? Если не знаешь точно, напиши примерно или <code>00:00</code>.
  <i>Формат: ЧЧ:ММ</i>

not_valid_time_your_birth_question: |
  <b>Время — очень тонкая материя ⏳</b>
  Я не смогла распознать этот формат. Пожалуйста, напиши время своего рождения в формате <i>ЧЧ:ММ</i> (например, <code>15:30</code>). 

your_city_birth_question: |
  <b>Где зажглась твоя звезда? 🌍</b>

  Напиши город, в котором ты родилась. Это критически важно для построения твоей натальной карты.

your_city_residence_question: |
  Где сейчас бьется твое сердце? 🌍

  Напиши название города, в котором ты живешь. Это поможет мне присылать личный прогноз ровно в 7:00 по твоему местному времени ✨

not_valid_your_city_question: |
  <b>Атлас Вселенной не может найти это место 🗺️</b>

  Пожалуйста, проверь название города и напиши его еще раз! 🌍

successful_acquaintance: |
  <b> Твой профиль почти готов. Пожалуйста, проверь данные, которые мы собрали: </b>

  ✨ <b>Имя:</b> {name}
  ✨ <b>Пол:</b> {sex}
  📅 <b>Дата рождения:</b> {birthday}
  ⏰ <b>Время рождения:</b> {birth_time}
  📍 <b>Место рождения:</b> {birth_city}
  🏠 <b>Город проживания:</b> {residence_city}

  <i>Если я где-то ошиблась, ты всегда сможешь изменить данные в настройках профиля позже.</i>

  Жми <b>«Далее»</b>! 👇

premium_gift_five_days: |
  <b>Твой магический VIP-пропуск! 🎁✨</b>

  Я открываю тебе <b>Premium-доступ на 3 дня совершенно бесплатно</b>.

  В следующие 72 часа тебе доступны:
  💌 <b>Полный гороскоп на день</b> — узнай все детали каждый день в 07:00 утра.
  🃏 <b>Расклад Таро для твеого дня на 3 карты</b> - ежедневно.
  📈 <b>Лунный гороскоп на неделю</b>
  🪙 <b>Скидка 50% на все единоразовые услуги</b>

  Твоя энергия заслуживает того, чтобы сиять на максимум! Готова активировать свой подарок? 👇

menu_message: |
  Выбирай инструмент, который откликается твоему запросу прямо сейчас и начнем ✨
  <b>Что подсказывает тебе интуиция? 👇</b>

analyzing_data_wait: | 
  <b>Связываюсь с космосом... 🌌</b>
  
  Анализирую твои данные и рассчитываю персональный прогноз. Подожди буквально мгновение... ✨

matrix_wait: | 
  <b>Расшифровываю код твоей души... 🧬</b>
  Рассчитываю ключевые узлы Матрицы Судьбы по твоей дате рождения... 💫

bodygraph_wait: |  
  <b>Составляю твой Бодиграф... 💠</b>
  Рассчитываю базу твоего Дизайна Человека. Готовлю глубокий синтез механики твоей личности... 🌌

### Сообщения для раздела Таро ================================================================
taro_one_card_wait: | 
  <b>Тасую колоду... 🃏</b>
  Вытягиваю для тебя одну карту, которая покажет главную энергию настоящего момента... 🔮

taro_three_cards_wait: | 
  <b>Раскладываю карты... 🃏</b>
  Делаю расклад на 3 карты. Сейчас мы заглянем в прошлое, настоящее и увидим перспективу дня... ✨

deep_taro_query: | 
  <b>Глубокое погружение 🌊</b>
  Опиши суть проблемы или ситуации, которую ты хочешь разобрать. Чем точнее запрос, тем яснее будет ответ карт.

deep_taro_context: | 
  <b>Дополнительные штрихи 🖌️</b>
  Добавь дополнительные детали или контекст ситуации (по желанию). Если хочешь пропустить этот шаг, просто нажми «Пропустить».

deep_taro_wait: | 
